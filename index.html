<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌌 Vũ Trụ Magic Hand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }

    #video {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.22;
      z-index: 0;
    }

    #canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #status {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: rgba(2, 0, 18, 0.88);
      color: #99ccff;
      padding: 8px 28px;
      border-radius: 28px;
      border: 1px solid rgba(60, 120, 220, 0.45);
      font-size: 0.82rem;
      backdrop-filter: blur(16px);
      white-space: nowrap;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px #4488ff66;
    }

    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: rgba(2, 0, 18, 0.8);
      color: rgba(160, 200, 255, 0.75);
      padding: 10px 34px;
      border-radius: 32px;
      border: 1px solid rgba(50, 100, 200, 0.35);
      font-size: 0.78rem;
      backdrop-filter: blur(16px);
      text-align: center;
      line-height: 1.8;
      pointer-events: none;
    }

    /* ── Overlay ─────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(28,8,75,0.95) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 65%, rgba(8,28,80,0.9)  0%, transparent 55%),
        radial-gradient(ellipse at 50% 95%, rgba(55,0,28,0.55) 0%, transparent 50%),
        #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; overflow: hidden;
    }

    #bg-canvas { position: absolute; inset: 0; z-index: 0; }

    .ov-content {
      display: flex; flex-direction: column;
      align-items: center; gap: 26px; z-index: 1;
    }

    .ov-title {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #88ccff, #cc88ff, #ffaa55, #88ccff);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 7px; text-align: center;
      animation: shimmer 4s linear infinite;
      filter: drop-shadow(0 0 28px rgba(100,160,255,.5));
    }
    @keyframes shimmer { to { background-position: 300% 50%; } }

    .ov-sub {
      color: rgba(160,200,255,.6);
      font-size: .88rem; text-align: center;
      max-width: 360px; line-height: 1.9;
    }

    .gest-row { display: flex; gap: 28px; }
    .gest-card {
      background: rgba(10,20,60,.65);
      border: 1px solid rgba(60,120,220,.35);
      border-radius: 18px; padding: 18px 26px;
      text-align: center; color: rgba(180,210,255,.8);
      font-size: .8rem; line-height: 1.9;
      backdrop-filter: blur(8px);
    }
    .gest-card .ico { font-size: 2.2rem; display: block; margin-bottom: 4px; }

    #start-btn {
      background: linear-gradient(135deg, rgba(20,60,160,.8) 0%, rgba(5,10,40,.9) 100%);
      color: #aaccff;
      border: 1.5px solid rgba(80,140,255,.6);
      padding: 16px 58px; border-radius: 50px;
      font-size: 1.05rem; cursor: pointer;
      letter-spacing: 3px;
      box-shadow: 0 0 40px rgba(60,100,255,.3), 0 0 80px rgba(20,60,200,.15);
      transition: all .3s;
    }
    #start-btn:hover {
      box-shadow: 0 0 70px rgba(80,150,255,.75), 0 0 140px rgba(40,100,255,.35);
      transform: scale(1.06); border-color: #88bbff; color: #fff;
    }
    #start-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Nhấn nút để bắt đầu hành trình vũ trụ</div>
<div id="hint">
  ✊ <strong>Chụm 5 ngón tay</strong> → Ngôi sao hội tụ
  &nbsp;·&nbsp;
  🖐 <strong>Bung 5 ngón tay</strong> → Vũ trụ nở ra, ảnh hiện lên
</div>

<div id="overlay">
  <canvas id="bg-canvas"></canvas>
  <div class="ov-content">
    <div class="ov-title">🌌 VŨ TRỤ 🌌</div>
    <div class="ov-sub">Điều khiển vũ trụ bằng bàn tay của bạn<br>Trải nghiệm kỳ diệu đang chờ phía trước</div>
    <div class="gest-row">
      <div class="gest-card"><span class="ico">✊</span>Chụm 5 ngón tay<br><span style="color:#88aaff">→ Ngôi sao ra đời</span></div>
      <div class="gest-card"><span class="ico">🖐</span>Bung 5 ngón tay<br><span style="color:#ffcc55">→ Vũ trụ bùng nổ</span></div>
    </div>
    <button id="start-btn">🚀 Khám Phá Vũ Trụ</button>
  </div>
</div>

<!-- MediaPipe Tasks Vision (newer, reliable, no COOP/COEP needed) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>

<script>
'use strict';
// ── Overlay starfield ────────────────────────────────────────────────────────
(function () {
  const bc = document.getElementById('bg-canvas');
  const bx = bc.getContext('2d');
  function setSize() { bc.width = innerWidth; bc.height = innerHeight; }
  setSize(); window.addEventListener('resize', setSize);

  const stars = Array.from({ length: 280 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.8 + 0.3,
    h: 180 + Math.random() * 80,
    a: Math.random() * 0.6 + 0.2,
    sp: Math.random() * 0.25 + 0.05,
    ph: Math.random() * Math.PI * 2
  }));

  let t = 0;
  (function bgLoop() {
    t += 0.01;
    bx.clearRect(0, 0, bc.width, bc.height);

    // Nebula blobs
    [[.28,.38,340,210,250,.08],[.74,.6,290,190,200,.07],[.5,.85,240,145,345,.06]].forEach(([cx,cy,rx,ry,h,a]) => {
      const gr = bx.createRadialGradient(cx*bc.width, cy*bc.height, 0, cx*bc.width, cy*bc.height, rx);
      gr.addColorStop(0, `hsla(${h},80%,50%,${a})`); gr.addColorStop(1, 'transparent');
      bx.save(); bx.scale(1, ry/rx);
      bx.beginPath();
      bx.arc(cx*bc.width, cy*bc.height*(rx/ry), rx, 0, Math.PI*2);
      bx.fillStyle = gr; bx.fill();
      bx.restore();
    });

    // Twinkling stars — always positive radius
    for (const s of stars) {
      const tw = 0.2 + Math.abs(Math.sin(t * s.sp + s.ph)) * 0.8;
      bx.beginPath();
      bx.arc(s.x * bc.width, s.y * bc.height, Math.max(0.1, s.r * tw), 0, Math.PI * 2);
      bx.fillStyle = `hsla(${s.h},60%,90%,${s.a * tw})`;
      bx.fill();
    }

    // Milky-way shimmer
    const mw = bx.createLinearGradient(0, bc.height*.2, bc.width, bc.height*.8);
    mw.addColorStop(0,'transparent'); mw.addColorStop(.35,'rgba(120,100,200,.04)');
    mw.addColorStop(.5,'rgba(160,140,255,.07)'); mw.addColorStop(.65,'rgba(100,120,200,.04)');
    mw.addColorStop(1,'transparent');
    bx.fillStyle = mw; bx.fillRect(0,0,bc.width,bc.height);

    requestAnimationFrame(bgLoop);
  }());
}());

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const video   = document.getElementById('video');
const statusEl= document.getElementById('status');
const startBtn= document.getElementById('start-btn');
const overlay = document.getElementById('overlay');

let W, H;
const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
resize(); window.addEventListener('resize', resize);

// ── roundRect polyfill ───────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);   this.quadraticCurveTo(x+w, y,   x+w, y+r);
    this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);   this.quadraticCurveTo(x,   y+h, x,   y+h-r);
    this.lineTo(x,   y+r);   this.quadraticCurveTo(x,   y,   x+r, y);
    this.closePath(); return this;
  };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const lerp  = (a,b,t) => a+(b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const easeOutBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };

// ── Preload images ────────────────────────────────────────────────────────────
const IMAGE_FILES = [
  'e686854e-5227.webp',
  '052a032c-de4e787f59e14632b66e31f33997da7e1_all_843.jpg',
  '15be24a9-de4e787f59e14632b66e31f33997da7e1_all_884.jpg',
  '1dac40a2-de4e787f59e14632b66e31f33997da7e1_all_615.jpg',
  '386b0c3f-de4e787f59e14632b66e31f33997da7e1_all_143.webp',
  '3d27bef8-415.jpg',
  '6b2cc656-de4e787f59e14632b66e31f33997da7e1_all_1164.webp',
  '71b68947-de4e787f59e14632b66e31f33997da7e1_all_891.jpg',
  '7a19b3b7-2168.jpg',
  'cf402381-2221.jpg',
  'dc46af1e-de4e787f59e14632b66e31f33997da7e1_all_140.jpg',
];
const loadedImgs = new Array(IMAGE_FILES.length).fill(null);
let imagesReady = false;
let doneCount   = 0;
IMAGE_FILES.forEach((f, i) => {
  const img = new Image();
  img.onload  = () => { loadedImgs[i] = img; if (++doneCount === IMAGE_FILES.length) imagesReady = true; };
  img.onerror = () => {                        if (++doneCount === IMAGE_FILES.length) imagesReady = true; };
  img.src = f;
});

// ── Particle ──────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,r,hue,life) {
    Object.assign(this,{x,y,vx,vy,r,hue,life,maxLife:life});
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vx*=.965; this.vy*=.965; this.life--; }
  get a(){ return this.life/this.maxLife; }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,Math.max(.1,this.r*this.a),0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},100%,75%,${this.a})`;
    ctx.shadowColor=`hsl(${this.hue},100%,65%)`; ctx.shadowBlur=14; ctx.fill();
  }
}
const particles=[];
function burst(x,y,n,hBase,hRange,spd,r){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=spd*(.35+Math.random()*.85);
    particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,r+Math.random()*2.5,hBase+Math.random()*hRange,45+Math.random()*50));
  }
}

// ── Shooting star ─────────────────────────────────────────────────────────────
class ShootingStar {
  constructor(){ this.reset(); }
  reset(){
    this.x=Math.random()*W; this.y=Math.random()*H*.5;
    this.len=65+Math.random()*120; this.spd=12+Math.random()*10;
    this.ang=Math.PI/4+Math.random()*.4; this.life=1; this.alive=true;
  }
  update(){
    this.x+=Math.cos(this.ang)*this.spd; this.y+=Math.sin(this.ang)*this.spd;
    this.life-=.03;
    if(this.life<=0||this.x>W||this.y>H) this.alive=false;
  }
  draw(){
    const tx=this.x-Math.cos(this.ang)*this.len, ty=this.y-Math.sin(this.ang)*this.len;
    const gr=ctx.createLinearGradient(tx,ty,this.x,this.y);
    gr.addColorStop(0,'transparent'); gr.addColorStop(1,`rgba(200,230,255,${this.life*.9})`);
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(this.x,this.y);
    ctx.strokeStyle=gr; ctx.lineWidth=1.5;
    ctx.shadowColor='rgba(180,220,255,.8)'; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
  }
}
const shooters=[]; let shootT=0;

// ── Orbiting planet rings ─────────────────────────────────────────────────────
class OrbRing {
  constructor(i,n){
    this.ang=(i/n)*Math.PI*2;
    this.spd=(0.016+Math.random()*.012)*(i%2?1:-1);
    this.orbitR=50+Math.random()*24;
    this.tiltY=0.22+Math.random()*.4;
    this.r=1.2+Math.random()*2.2;
    this.hue=180+Math.random()*120;
    this.alp=.45+Math.random()*.5;
  }
  draw(cx,cy,op){
    this.ang+=this.spd;
    const x=cx+Math.cos(this.ang)*this.orbitR, y=cy+Math.sin(this.ang)*this.orbitR*this.tiltY;
    ctx.beginPath(); ctx.arc(x,y,this.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},100%,82%,${this.alp*op})`;
    ctx.shadowColor=`hsl(${this.hue},100%,70%)`; ctx.shadowBlur=14; ctx.fill();
  }
}
const orbRings=Array.from({length:40},(_,i)=>new OrbRing(i,40));

// ── Cosmic dust ───────────────────────────────────────────────────────────────
class Dust {
  constructor(){ this.reset(); }
  reset(){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.25; this.vy=(Math.random()-.5)*.12;
    this.r=Math.random()*1.4+.2; this.hue=180+Math.random()*120;
    this.life=150+Math.random()*200; this.maxLife=this.life;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; if(this.life<=0) this.reset(); }
  draw(){
    const a=(this.life/this.maxLife)*.28;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},70%,80%,${a})`; ctx.fill();
  }
}
const dustArr=Array.from({length:280},()=>new Dust());

// ── Planet / Star ball ────────────────────────────────────────────────────────
let ballT=0;
function drawPlanet(cx,cy,op){
  if(op<.01) return;
  ballT+=.05;
  ctx.shadowBlur=0;
  const r=56+Math.sin(ballT)*9;

  // Corona glows
  [[200,80,60,.08],[220,100,55,.07],[245,100,50,.05],[265,100,45,.04]].forEach(([h,s,l,a],i)=>{
    const gr=ctx.createRadialGradient(cx,cy,r*.5,cx,cy,r*(2.2+i*.9));
    gr.addColorStop(0,`hsla(${h},${s}%,${l}%,${a*op})`); gr.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(cx,cy,r*(2.2+i*.9),0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  });

  // Saturn ring
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,.28);
  const rg=ctx.createLinearGradient(-r*2.1,0,r*2.1,0);
  rg.addColorStop(0,'transparent');
  rg.addColorStop(.18,`hsla(210,80%,70%,${op*.5})`);
  rg.addColorStop(.42,`hsla(230,90%,80%,${op*.7})`);
  rg.addColorStop(.5,'transparent');
  rg.addColorStop(.58,`hsla(230,90%,80%,${op*.7})`);
  rg.addColorStop(.82,`hsla(210,80%,70%,${op*.5})`);
  rg.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.ellipse(0,0,r*2.1,r*2.1,0,0,Math.PI*2);
  ctx.lineWidth=18*op; ctx.strokeStyle=rg;
  ctx.shadowColor=`hsla(220,100%,70%,${op})`; ctx.shadowBlur=20; ctx.stroke();
  ctx.restore();

  // Main sphere
  const gr=ctx.createRadialGradient(cx-r*.28,cy-r*.3,0,cx,cy,r);
  gr.addColorStop(0,`rgba(240,250,255,${op})`);
  gr.addColorStop(.18,`hsla(210,80%,88%,${op})`);
  gr.addColorStop(.45,`hsla(220,100%,60%,${op})`);
  gr.addColorStop(.75,`hsla(240,100%,35%,${op})`);
  gr.addColorStop(1,  `hsla(260,100%,15%,${op})`);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.shadowColor=`hsla(220,100%,70%,${op})`; ctx.shadowBlur=55;
  ctx.fill(); ctx.shadowBlur=0;

  // Atmosphere bands
  for(let i=0;i<3;i++){
    const by=cy+(i-1)*r*.3+Math.sin(ballT*.4+i)*r*.08;
    const bg=ctx.createLinearGradient(cx-r,by,cx+r,by);
    bg.addColorStop(0,'transparent');
    bg.addColorStop(.3,`hsla(${190+i*20},80%,75%,${op*.12})`);
    bg.addColorStop(.7,`hsla(${210+i*20},80%,70%,${op*.08})`);
    bg.addColorStop(1,'transparent');
    ctx.save();
    ctx.beginPath(); ctx.ellipse(cx,cy,r,r,0,0,Math.PI*2); ctx.clip();
    ctx.fillStyle=bg; ctx.fillRect(cx-r,by-r*.2,r*2,r*.4);
    ctx.restore();
  }

  // Glint
  const g2=ctx.createRadialGradient(cx-r*.3,cy-r*.32,0,cx-r*.12,cy-r*.18,r*.45);
  g2.addColorStop(0,`rgba(255,255,255,${op*.75})`); g2.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g2; ctx.fill();

  for(const rb of orbRings) rb.draw(cx,cy,op);
  ctx.shadowBlur=0;
}

// ── Photo cards ───────────────────────────────────────────────────────────────
class PhotoCard {
  constructor(img,i,n){
    this.img=img;
    this.ang=(i/n)*Math.PI*2-Math.PI*.5;
    this.orbitR=Math.min(W,H)*.35;
    this.w=Math.min(W,H)*.18; this.h=this.w*.72;
    this.tilt=(Math.random()-.5)*.2;
    this.floatPh=Math.random()*Math.PI*2;
    this.glowH=180+i*(200/n);
    this.delay=i*.055;
    this.driftA=4+Math.random()*6;
  }
  draw(cx,cy,prog,t){
    if(!this.img) return;
    const sg=clamp(prog*1.9-this.delay,0,1);
    if(sg<=.001) return;
    const ease=easeOutBack(clamp(sg,0,1));
    const alpha=clamp(sg*2,0,1);
    const tx=cx+Math.cos(this.ang)*this.orbitR;
    const ty=cy+Math.sin(this.ang)*this.orbitR+Math.sin(t*.65+this.floatPh)*this.driftA*ease;
    const x=lerp(cx,tx,ease), y=lerp(cy,ty,ease);
    const w=this.w*ease, h=this.h*ease, rx=12*ease;

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(x,y); ctx.rotate(this.tilt);

    // Shadow
    ctx.shadowColor='rgba(0,5,30,.7)';
    ctx.shadowBlur=28; ctx.shadowOffsetX=5; ctx.shadowOffsetY=10;

    // Clip+draw
    ctx.save();
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,rx); ctx.clip();
    ctx.drawImage(this.img,-w/2,-h/2,w,h);
    ctx.restore();

    // Glow border
    ctx.shadowColor=`hsl(${this.glowH},100%,65%)`;
    ctx.shadowBlur=24; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    ctx.strokeStyle=`hsla(${this.glowH},100%,78%,.8)`;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,rx); ctx.stroke();

    // Corner sparkles (fully expanded)
    if(ease>.7){
      const alp=(ease-.7)*3*.7;
      ctx.fillStyle=`hsla(${this.glowH},100%,95%,${alp})`;
      ctx.shadowColor=`hsl(${this.glowH},100%,80%)`; ctx.shadowBlur=8;
      [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]].forEach(([ex,ey])=>{
        const sr=Math.max(.1,2.5+Math.sin(t*2+this.floatPh)*1.2);
        ctx.beginPath(); ctx.arc(ex,ey,sr,0,Math.PI*2); ctx.fill();
      });
    }
    ctx.restore();
  }
}
let photoCards=[];

// ── Hand skeleton ─────────────────────────────────────────────────────────────
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function drawSkeleton(lm,alpha){
  const mx=p=>(1-p.x)*W, my=p=>p.y*H;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.strokeStyle='rgba(120,185,255,.65)'; ctx.lineWidth=1.6;
  ctx.shadowColor='#44aaff'; ctx.shadowBlur=12;
  for(const [a,b] of CONN){
    ctx.beginPath(); ctx.moveTo(mx(lm[a]),my(lm[a])); ctx.lineTo(mx(lm[b]),my(lm[b])); ctx.stroke();
  }
  for(let i=0;i<lm.length;i++){
    ctx.beginPath(); ctx.arc(mx(lm[i]),my(lm[i]),i===0?5.5:3,0,Math.PI*2);
    ctx.fillStyle=[4,8,12,16,20].includes(i)?'#fff':'rgba(140,200,255,.9)';
    ctx.shadowBlur=16; ctx.fill();
  }
  ctx.restore();
}

// ── Gesture: openness 0=closed, 1=open ───────────────────────────────────────
function getOpenness(lm){
  const pcx=(lm[0].x+lm[5].x+lm[9].x+lm[13].x+lm[17].x)/5;
  const pcy=(lm[0].y+lm[5].y+lm[9].y+lm[13].y+lm[17].y)/5;
  const ref=Math.hypot(lm[0].x-lm[9].x,lm[0].y-lm[9].y);
  if(ref<.01) return 0;
  let d=0;
  for(const t of [4,8,12,16,20]) d+=Math.hypot(lm[t].x-pcx,lm[t].y-pcy);
  return clamp((d/5/ref-.45)/.95,0,1);
}

// ── State ─────────────────────────────────────────────────────────────────────
let curLm=null, handSeen=false;
let palmX=null, palmY=null;
let smoothOpen=0, prevSmooth=0;
let appTime=0, frame=0, lastHandTs=0;
let handDetector=null, lastVidTime=-1;

// ── Render loop ───────────────────────────────────────────────────────────────
function renderLoop(){
  frame++; appTime+=.016;
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(0,0,8,.15)'; ctx.fillRect(0,0,W,H);

  // Cosmic dust
  ctx.shadowBlur=0;
  for(const d of dustArr){ d.update(); d.draw(); }

  // Shooting stars
  if(++shootT>220+Math.random()*300){ shootT=0; shooters.push(new ShootingStar()); }
  for(let i=shooters.length-1;i>=0;i--){
    shooters[i].update(); shooters[i].draw();
    if(!shooters[i].alive) shooters.splice(i,1);
  }

  // Burst particles
  ctx.shadowBlur=0;
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update(); particles[i].draw();
    if(particles[i].life<=0) particles.splice(i,1);
  }
  ctx.shadowBlur=0;

  // Ball / palm position
  let bx, by;
  if(handSeen&&curLm){
    const lm=curLm;
    const pn=(lm[0].x+lm[5].x+lm[9].x+lm[13].x+lm[17].x)/5;
    const pm=(lm[0].y+lm[5].y+lm[9].y+lm[13].y+lm[17].y)/5;
    const tx=(1-pn)*W, ty=pm*H;
    palmX=palmX===null?tx:lerp(palmX,tx,.22);
    palmY=palmY===null?ty:lerp(palmY,ty,.22);
    bx=palmX; by=palmY;
    smoothOpen=lerp(smoothOpen,getOpenness(lm),.10);
  } else {
    const dr=appTime*.35;
    bx=W/2+Math.sin(dr)*22; by=H/2+Math.cos(dr*.62)*14;
    smoothOpen=lerp(smoothOpen,0,.04);
  }

  // Transition effects
  if(smoothOpen>.68&&prevSmooth<=.68){
    burst(bx,by,60,42,40,10,3.5);  // Big Bang golden
    burst(bx,by,30,200,60,7,2.5);  // blue
    burst(bx,by,18,0,360,12,2);    // rainbow
  }
  if(smoothOpen<.28&&prevSmooth>=.28) burst(bx,by,30,210,50,6,2.5);
  prevSmooth=smoothOpen;

  // Inward suction (closed)
  if(smoothOpen<.4&&frame%2===0&&handSeen){
    const a=Math.random()*Math.PI*2, dd=90+Math.random()*70;
    particles.push(new Particle(bx+Math.cos(a)*dd,by+Math.sin(a)*dd,-Math.cos(a)*3.5,-Math.sin(a)*3.5,1.5+Math.random()*1.5,200+Math.random()*60,30));
  }
  // Outward shimmer (open)
  if(smoothOpen>.62&&frame%3===0&&handSeen){
    const a=Math.random()*Math.PI*2, s=2.5+Math.random()*4;
    particles.push(new Particle(bx,by,Math.cos(a)*s,Math.sin(a)*s,2+Math.random()*2.5,40+Math.random()*30,55));
  }

  // Draw planet (closed)
  const ballOp=clamp(Math.pow(1-smoothOpen*1.4,1.7),0,1);
  drawPlanet(bx,by,ballOp);

  // Draw photo cards (open)
  const photoP=clamp((smoothOpen-.18)/.55,0,1);
  for(const c of photoCards) c.draw(bx,by,photoP,appTime);

  if(handSeen&&curLm) drawSkeleton(curLm,.35+smoothOpen*.5);
  ctx.shadowBlur=0;
  requestAnimationFrame(renderLoop);
}

// ── Hand detection loop (uses tasks-vision detectForVideo) ────────────────────
function detectLoop(){
  if(handDetector&&video.readyState>=2){
    const nowMs=performance.now();
    if(video.currentTime!==lastVidTime){
      lastVidTime=video.currentTime;
      try{
        const res=handDetector.detectForVideo(video,nowMs);
        if(res.landmarks&&res.landmarks.length>0){
          curLm=res.landmarks[0];
          handSeen=true; lastHandTs=Date.now();
          const o=getOpenness(curLm);
          statusEl.textContent=o>.65?'🌌 Vũ trụ bùng nổ — Ảnh nở ra ✨':o<.28?'⭐ Ngôi sao hội tụ 🪐':'🤚 Nhận diện cử chỉ...';
        } else {
          if(Date.now()-lastHandTs>800){ handSeen=false; curLm=null; }
          statusEl.textContent='👋 Đưa tay vào vũ trụ';
        }
      } catch(e){ /* skip bad frame */ }
    }
  }
  requestAnimationFrame(detectLoop);
}

// ── Start app ─────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled=true;
  startBtn.textContent='⏳ Đang tải AI...';

  // 1. Check library loaded
  if(typeof FilesetResolver==='undefined'||typeof HandLandmarker==='undefined'){
    statusEl.textContent='❌ Thư viện AI chưa tải. Kiểm tra mạng & tải lại trang.';
    startBtn.disabled=false; startBtn.textContent='🔄 Tải lại';
    startBtn.addEventListener('click',()=>location.reload(),{once:true});
    return;
  }

  try{
    // 2. Init hand detector
    const vision=await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    handDetector=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate:'GPU'
      },
      runningMode:'VIDEO',
      numHands:1
    });

    startBtn.textContent='📷 Đang mở camera...';

    // 3. Camera
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{ width:1280, height:720, facingMode:'user' },
      audio:false
    });
    video.srcObject=stream;
    await video.play();

    // 4. Hide overlay, start loops
    overlay.classList.add('hidden');
    statusEl.textContent='👋 Đưa tay vào vũ trụ';

    // 5. Load photo cards
    const iv=setInterval(()=>{
      if(imagesReady){
        clearInterval(iv);
        const imgs=loadedImgs.filter(Boolean);
        photoCards=imgs.map((img,i)=>new PhotoCard(img,i,imgs.length));
      }
    },200);

    detectLoop();

  } catch(e){
    console.error(e);
    let msg='❌ Lỗi: '+e.message;
    if(e.name==='NotAllowedError') msg='❌ Bạn cần cấp quyền camera để dùng ứng dụng';
    if(e.name==='NotFoundError')   msg='❌ Không tìm thấy camera trên thiết bị này';
    statusEl.textContent=msg;
    startBtn.disabled=false;
    startBtn.textContent='🚀 Thử lại';
    overlay.classList.remove('hidden');
  }
});

// Start visual render loop right away (shows ambient universe)
renderLoop();
</script>
